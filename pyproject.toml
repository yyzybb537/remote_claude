[project]
name = "remote-claude"
version = "1.0.4"
description = "双端共享 Claude CLI 工具"
requires-python = ">=3.11"
dependencies = [
    "lark-oapi==1.5.3",
    "python-dotenv==1.2.2",
    "pyte>=0.8.0",
    "mixpanel>=5.0.0",
    "python-socks[asyncio]>=2.0.0",
    "websockets>=12.0",
]

[project.scripts]
remote-claude = "remote_claude:main"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
